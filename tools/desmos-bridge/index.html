<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planar Geometry Desmos Bridge</title>
  <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=8b15cf51fb804d80a5d3d2278786f64c" defer></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 58px); }
    .panel { padding: 16px; border-right: 1px solid #ddd; overflow-y: auto; }
    #calculator { width: 100%; height: calc(100vh - 58px); }
    .row { margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; }
    button { margin-right: 8px; margin-top: 6px; }
    pre { background: #f7f7f7; border: 1px solid #ddd; padding: 8px; overflow: auto; max-height: 220px; }
    .error { color: #a30000; }
    .success { color: #136f1e; }
  </style>
</head>
<body>
  <header>
    <strong>Planar Geometry Engine ↔ Desmos Bridge</strong>
  </header>
  <main>
    <section class="panel">
      <div class="row">
        <label for="fileInput">Import polygon or triangulation schema JSON file</label>
        <input id="fileInput" type="file" accept="application/json,.json" />
      </div>

      <div class="row">
        <label for="endpointInput">Or fetch polygon/triangulation schema from local endpoint URL</label>
        <input id="endpointInput" type="text" placeholder="http://localhost:8080/polygon.json" />
        <button id="fetchBtn" type="button">Fetch & Import</button>
      </div>

      <div class="row">
        <button id="exportStateBtn" type="button">Export full Desmos state (.json)</button>
        <button id="exportPolysBtn" type="button">Export polygon schema (.json)</button>
      </div>

      <div class="row">
        <strong>Status</strong>
        <div id="status"></div>
      </div>

      <div class="row">
        <strong>Detected schema</strong>
        <pre id="schemaPreview">(none)</pre>
      </div>
    </section>
    <section id="calculator"></section>
  </main>

  <script>
    const calculatorElt = document.getElementById('calculator');
    const statusElt = document.getElementById('status');
    const schemaPreviewElt = document.getElementById('schemaPreview');
    const fileInputElt = document.getElementById('fileInput');
    const endpointInputElt = document.getElementById('endpointInput');

    let calculator = null;

    function setStatus(message, isError = false) {
      statusElt.className = isError ? 'error' : 'success';
      statusElt.textContent = message;
    }

    function isNumeric(value) {
      return typeof value === 'number' && Number.isFinite(value);
    }

    function normalizePoints(points) {
      if (!Array.isArray(points)) {
        throw new Error('points must be an array');
      }

      const normalized = points.map((pair, idx) => {
        if (!Array.isArray(pair) || pair.length !== 2) {
          throw new Error(`point at index ${idx} is not [x,y]`);
        }
        const [x, y] = pair;
        if (!isNumeric(x) || !isNumeric(y)) {
          throw new Error(`point at index ${idx} has non-numeric coordinate(s)`);
        }
        return [x, y];
      });

      if (normalized.length > 1) {
        const first = normalized[0];
        const last = normalized[normalized.length - 1];
        const closesPolygon = first[0] === last[0] && first[1] === last[1];
        if (closesPolygon) {
          normalized.pop();
        }
      }

      if (normalized.length < 3) {
        throw new Error('polygon must have at least 3 unique vertices');
      }

      return normalized;
    }

    function parsePolygonSchema(input) {
      const schema = typeof input === 'string' ? JSON.parse(input) : input;
      if (!schema || schema.type !== 'polygon') {
        throw new Error('Expected schema object with type="polygon"');
      }
      if (typeof schema.id !== 'string' || schema.id.length === 0) {
        throw new Error('Polygon schema must include non-empty string id');
      }

      const points = normalizePoints(schema.points);
      return { type: 'polygon', id: schema.id, points };
    }

    function parseTriangulationSchema(input) {
      const schema = typeof input === 'string' ? JSON.parse(input) : input;
      if (!schema || schema.type !== 'triangulation') {
        throw new Error('Expected schema object with type="triangulation"');
      }
      if (typeof schema.id !== 'string' || schema.id.length === 0) {
        throw new Error('Triangulation schema must include non-empty string id');
      }
      if (!Array.isArray(schema.polygons) || schema.polygons.length === 0) {
        throw new Error('Triangulation schema must include non-empty polygons array');
      }

      const polygons = schema.polygons.map((polygonSchema, idx) => {
        if (!polygonSchema || polygonSchema.type !== 'polygon') {
          throw new Error(`Triangulation polygon at index ${idx} must have type="polygon"`);
        }
        const points = normalizePoints(polygonSchema.points);
        if (points.length !== 3) {
          throw new Error(`Triangulation polygon at index ${idx} must have exactly 3 vertices`);
        }
        return { type: 'polygon', points };
      });

      return { type: 'triangulation', id: schema.id, polygons };
    }

    function pointsToLatex(points) {
      return `polygon(${points.map(([x, y]) => `(${x},${y})`).join(',')})`;
    }

    function importPolygonSchema(schema) {
      if (!calculator) {
        throw new Error('Desmos calculator is not initialized yet.');
      }
      const parsed = parsePolygonSchema(schema);
      const latex = pointsToLatex(parsed.points);
      calculator.setExpression({ id: parsed.id, latex, fillOpacity: 0.2 });
      return parsed;
    }

    function importTriangulationSchema(schema) {
      if (!calculator) {
        throw new Error('Desmos calculator is not initialized yet.');
      }
      const parsed = parseTriangulationSchema(schema);
      parsed.polygons.forEach((polygon, idx) => {
        const latex = pointsToLatex(polygon.points);
        calculator.setExpression({
          id: `${parsed.id}_tri_${idx + 1}`,
          latex,
          color: '#6f4ff2',
          fill: false,
          fillOpacity: 0,
          lineOpacity: 1,
          lineWidth: 2,
        });
      });
      return parsed;
    }

    function importSchema(schema) {
      const parsed = typeof schema === 'string' ? JSON.parse(schema) : schema;
      if (!parsed || typeof parsed.type !== 'string') {
        throw new Error('Schema must include a string type field');
      }

      if (parsed.type === 'polygon') {
        const imported = importPolygonSchema(parsed);
        schemaPreviewElt.textContent = JSON.stringify(imported, null, 2);
        setStatus(`Imported polygon ${imported.id} with ${imported.points.length} vertices.`);
        return;
      }

      if (parsed.type === 'triangulation') {
        const imported = importTriangulationSchema(parsed);
        schemaPreviewElt.textContent = JSON.stringify(imported, null, 2);
        setStatus(`Imported triangulation ${imported.id} with ${imported.polygons.length} polygons.`);
        return;
      }

      throw new Error(`Unsupported schema type: ${parsed.type}`);
    }

    fileInputElt.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }

      try {
        importSchema(await file.text());
      } catch (error) {
        setStatus(`Import failed: ${error.message}`, true);
      }
    });

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const endpoint = endpointInputElt.value.trim();
      if (!endpoint) {
        setStatus('Please provide an endpoint URL.', true);
        return;
      }

      try {
        const response = await fetch(endpoint);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        importSchema(await response.json());
      } catch (error) {
        setStatus(`Fetch/import failed: ${error.message}`, true);
      }
    });

    function downloadJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('exportStateBtn').addEventListener('click', () => {
      if (!calculator) {
        setStatus('Desmos calculator is not initialized yet.', true);
        return;
      }
      const state = calculator.getState();
      downloadJson('desmos-state.json', state);
      setStatus('Exported full Desmos state.');
    });

    document.getElementById('exportPolysBtn').addEventListener('click', () => {
      if (!calculator) {
        setStatus('Desmos calculator is not initialized yet.', true);
        return;
      }
      const expressions = calculator.getExpressions();
      const polygons = expressions
        .filter((expr) => typeof expr.latex === 'string' && expr.latex.startsWith('polygon('))
        .map((expr) => ({ type: 'polygon-expression', id: expr.id, latex: expr.latex }));
      downloadJson('desmos-polygons.json', polygons);
      setStatus(`Exported ${polygons.length} polygon expression(s).`);
    });

    window.addEventListener('load', () => {
      if (typeof Desmos === 'undefined' || !Desmos.GraphingCalculator) {
        setStatus('Failed to load Desmos API. Check your network connection and reload.', true);
        return;
      }
      calculator = Desmos.GraphingCalculator(calculatorElt, { expressions: true });
      setStatus('Ready. Choose a schema JSON file to import.');
    });
  </script>
</body>
</html>
