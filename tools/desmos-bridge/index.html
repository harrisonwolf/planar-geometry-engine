<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planar Geometry Desmos Bridge</title>
  <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=8b15cf51fb804d80a5d3d2278786f64c" defer></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 58px); }
    .panel { padding: 16px; border-right: 1px solid #ddd; overflow-y: auto; }
    #calculator { width: 100%; height: calc(100vh - 58px); }
    .row { margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; }
    button { margin-right: 8px; margin-top: 6px; }
    pre { background: #f7f7f7; border: 1px solid #ddd; padding: 8px; overflow: auto; max-height: 220px; }
    .error { color: #a30000; }
    .success { color: #136f1e; }
  </style>
</head>
<body>
  <header>
    <strong>Planar Geometry Engine ↔ Desmos Bridge</strong>
  </header>
  <main>
    <section class="panel">
      <div class="row">
        <label for="fileInput">Import polygon or triangulation schema JSON file</label>
        <input id="fileInput" type="file" accept="application/json,.json" />
        <button id="connectDirBtn" type="button">Connect export folder (one-time permission)</button>
      </div>

      <div class="row">
        <label for="endpointInput">Or fetch polygon/triangulation schema from local endpoint URL</label>
        <input id="endpointInput" type="text" placeholder="http://localhost:8080/polygon.json" />
        <button id="fetchBtn" type="button">Fetch & Import</button>
      </div>

      <div class="row">
        <button id="exportStateBtn" type="button">Export full Desmos state (.json)</button>
        <button id="exportPolysBtn" type="button">Export polygon schema (.json)</button>
      </div>

      <div class="row">
        <strong>Status</strong>
        <div id="status"></div>
      </div>

      <div class="row">
        <strong>Detected schema</strong>
        <pre id="schemaPreview">(none)</pre>
      </div>
    </section>
    <section id="calculator"></section>
  </main>

  <script>
    const calculatorElt = document.getElementById('calculator');
    const statusElt = document.getElementById('status');
    const schemaPreviewElt = document.getElementById('schemaPreview');
    const fileInputElt = document.getElementById('fileInput');
    const endpointInputElt = document.getElementById('endpointInput');
    const connectDirBtnElt = document.getElementById('connectDirBtn');

    const AUTO_IMPORT_BASE_PATHS = [
      '.',
      'http://127.0.0.1:8765',
      'http://localhost:8765',
    ];

    const AUTO_IMPORT_BUNDLE_ENDPOINTS = [
      'http://127.0.0.1:8765/bundle',
      'http://localhost:8765/bundle',
    ];

    const AUTO_IMPORT_SCHEMAS = [
      { type: 'polygon', filename: 'polygon-export.json' },
      { type: 'triangulation', filename: 'triangulation-export.json' },
    ];

    let calculator = null;


    const DIRECTORY_HANDLE_DB_NAME = 'desmosBridgeFs';
    const DIRECTORY_HANDLE_STORE = 'handles';
    const DIRECTORY_HANDLE_KEY = 'exportDir';


    function setStatus(message, isError = false) {
      statusElt.className = isError ? 'error' : 'success';
      statusElt.textContent = message;
    }

    function isNumeric(value) {
      return typeof value === 'number' && Number.isFinite(value);
    }

    function normalizePoints(points) {
      if (!Array.isArray(points)) {
        throw new Error('points must be an array');
      }

      const normalized = points.map((pair, idx) => {
        if (!Array.isArray(pair) || pair.length !== 2) {
          throw new Error(`point at index ${idx} is not [x,y]`);
        }
        const [x, y] = pair;
        if (!isNumeric(x) || !isNumeric(y)) {
          throw new Error(`point at index ${idx} has non-numeric coordinate(s)`);
        }
        return [x, y];
      });

      if (normalized.length > 1) {
        const first = normalized[0];
        const last = normalized[normalized.length - 1];
        const closesPolygon = first[0] === last[0] && first[1] === last[1];
        if (closesPolygon) {
          normalized.pop();
        }
      }

      if (normalized.length < 3) {
        throw new Error('polygon must have at least 3 unique vertices');
      }

      return normalized;
    }

    function parsePolygonSchema(input) {
      const schema = typeof input === 'string' ? JSON.parse(input) : input;
      if (!schema || schema.type !== 'polygon') {
        throw new Error('Expected schema object with type="polygon"');
      }
      if (typeof schema.id !== 'string' || schema.id.length === 0) {
        throw new Error('Polygon schema must include non-empty string id');
      }

      const points = normalizePoints(schema.points);
      return { type: 'polygon', id: schema.id, points };
    }

    function parseTriangulationSchema(input) {
      const schema = typeof input === 'string' ? JSON.parse(input) : input;
      if (!schema || schema.type !== 'triangulation') {
        throw new Error('Expected schema object with type="triangulation"');
      }
      if (typeof schema.id !== 'string' || schema.id.length === 0) {
        throw new Error('Triangulation schema must include non-empty string id');
      }
      if (!Array.isArray(schema.polygons) || schema.polygons.length === 0) {
        throw new Error('Triangulation schema must include non-empty polygons array');
      }

      const polygons = schema.polygons.map((polygonSchema, idx) => {
        if (!polygonSchema || polygonSchema.type !== 'polygon') {
          throw new Error(`Triangulation polygon at index ${idx} must have type="polygon"`);
        }
        const points = normalizePoints(polygonSchema.points);
        if (points.length !== 3) {
          throw new Error(`Triangulation polygon at index ${idx} must have exactly 3 vertices`);
        }
        return { type: 'polygon', points };
      });

      return { type: 'triangulation', id: schema.id, polygons };
    }

    function pointsToLatex(points) {
      return `polygon(${points.map(([x, y]) => `(${x},${y})`).join(',')})`;
    }

    function polygonsToLatexList(polygons) {
      return `[${polygons.map((polygon) => pointsToLatex(polygon.points)).join(',')}]`;
    }

    function importPolygonSchema(schema) {
      if (!calculator) {
        throw new Error('Desmos calculator is not initialized yet.');
      }
      const parsed = parsePolygonSchema(schema);
      const latex = pointsToLatex(parsed.points);
      calculator.setExpression({ id: parsed.id, latex, fillOpacity: 0.2 });
      return parsed;
    }

    function importTriangulationSchema(schema) {
      if (!calculator) {
        throw new Error('Desmos calculator is not initialized yet.');
      }
      const parsed = parseTriangulationSchema(schema);
      const latex = polygonsToLatexList(parsed.polygons);
      calculator.setExpression({
        id: parsed.id,
        latex,
        color: '#6f4ff2',
        fill: false,
        fillOpacity: 0,
        lineOpacity: 1,
        lineWidth: 2,
      });
      return parsed;
    }



    function supportsDirectoryHandlePersistence() {
      return 'showDirectoryPicker' in window && 'indexedDB' in window;
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DIRECTORY_HANDLE_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(DIRECTORY_HANDLE_STORE)) {
            db.createObjectStore(DIRECTORY_HANDLE_STORE);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('Failed to open IndexedDB'));
      });
    }

    async function saveDirectoryHandle(handle) {
      const db = await openHandleDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(DIRECTORY_HANDLE_STORE, 'readwrite');
        tx.objectStore(DIRECTORY_HANDLE_STORE).put(handle, DIRECTORY_HANDLE_KEY);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error || new Error('Failed to save directory handle'));
      });
      db.close();
    }

    async function loadDirectoryHandle() {
      const db = await openHandleDb();
      const handle = await new Promise((resolve, reject) => {
        const tx = db.transaction(DIRECTORY_HANDLE_STORE, 'readonly');
        const request = tx.objectStore(DIRECTORY_HANDLE_STORE).get(DIRECTORY_HANDLE_KEY);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error || new Error('Failed to load directory handle'));
      });
      db.close();
      return handle;
    }

    async function importFromDirectoryHandle(directoryHandle) {
      const imported = [];
      const failures = [];

      for (const schemaSpec of AUTO_IMPORT_SCHEMAS) {
        try {
          const fileHandle = await directoryHandle.getFileHandle(schemaSpec.filename);
          const file = await fileHandle.getFile();
          importSchema(await file.text());
          imported.push(schemaSpec.type);
        } catch (error) {
          failures.push(`${schemaSpec.type}: ${error.message}`);
        }
      }

      return { imported, failures };
    }

    async function tryAutoImportFromSavedDirectory() {
      if (!supportsDirectoryHandlePersistence()) {
        return { skipped: 'directory picker API unavailable in this browser' };
      }

      const handle = await loadDirectoryHandle();
      if (!handle) {
        return { skipped: 'no saved export-folder permission' };
      }

      const permission = await handle.queryPermission({ mode: 'read' });
      if (permission !== 'granted') {
        return { skipped: `saved folder permission is ${permission}` };
      }

      const result = await importFromDirectoryHandle(handle);
      if (result.imported.length === 0) {
        return { errors: [`saved export folder contained no importable schemas (${result.failures.join(' ; ')})`] };
      }

      return {
        imported: result.imported.map((schemaType) => `${schemaType} via saved export folder permission`),
        failures: result.failures,
      };
    }

    async function fetchJsonWithTimeout(endpoint, timeoutMs = 3000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(endpoint, { signal: controller.signal });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function fetchAndImportSchema(endpoint) {
      importSchema(await fetchJsonWithTimeout(endpoint));
    }

    function importSchema(schema) {
      const parsed = typeof schema === 'string' ? JSON.parse(schema) : schema;
      if (!parsed || typeof parsed.type !== 'string') {
        throw new Error('Schema must include a string type field');
      }

      if (parsed.type === 'polygon') {
        const imported = importPolygonSchema(parsed);
        schemaPreviewElt.textContent = JSON.stringify(imported, null, 2);
        setStatus(`Imported polygon ${imported.id} with ${imported.points.length} vertices.`);
        return;
      }

      if (parsed.type === 'triangulation') {
        const imported = importTriangulationSchema(parsed);
        schemaPreviewElt.textContent = JSON.stringify(imported, null, 2);
        setStatus(`Imported triangulation ${imported.id} with ${imported.polygons.length} polygons.`);
        return;
      }

      throw new Error(`Unsupported schema type: ${parsed.type}`);
    }

    function resolveAutoImportCandidates(filename) {
      return AUTO_IMPORT_BASE_PATHS.map((basePath) => {
        if (basePath === '.') {
          return filename;
        }
        return `${basePath}/${filename}`;
      });
    }

    async function fetchFirstAvailableSchema(filename) {
      const candidates = resolveAutoImportCandidates(filename);
      const errors = [];

      for (const endpoint of candidates) {
        try {
          const schema = await fetchJsonWithTimeout(endpoint);
          return { endpoint, schema };
        } catch (error) {
          errors.push(`${endpoint} (${error.message})`);
        }
      }

      throw new Error(`No readable source found for ${filename}. Tried: ${errors.join(' ; ')}`);
    }

    async function tryAutoImportBundle() {
      const errors = [];

      for (const endpoint of AUTO_IMPORT_BUNDLE_ENDPOINTS) {
        try {
          const payload = await fetchJsonWithTimeout(endpoint);
          const polygon = payload.loaded && payload.loaded.polygon_export;
          const triangulation = payload.loaded && payload.loaded.triangulation_export;
          const imported = [];

          if (polygon) {
            importSchema(polygon);
            imported.push('polygon');
          }
          if (triangulation) {
            importSchema(triangulation);
            imported.push('triangulation');
          }

          if (imported.length > 0) {
            return { endpoint, imported };
          }

          const helperErrors = payload.errors ? JSON.stringify(payload.errors) : 'missing loaded schemas';
          throw new Error(`No schemas in bundle payload: ${helperErrors}`);
        } catch (error) {
          errors.push(`${endpoint} (${error.message})`);
        }
      }

      return { errors };
    }

    async function autoImportDefaultSchemas() {
      const imported = [];
      const failures = [];

      try {
        const savedDirectoryResult = await tryAutoImportFromSavedDirectory();
        if (savedDirectoryResult.imported && savedDirectoryResult.imported.length > 0) {
          imported.push(...savedDirectoryResult.imported);
        }
        if (savedDirectoryResult.failures && savedDirectoryResult.failures.length > 0) {
          failures.push(...savedDirectoryResult.failures.map((message) => `saved-folder: ${message}`));
        }
        if (savedDirectoryResult.errors && savedDirectoryResult.errors.length > 0) {
          failures.push(...savedDirectoryResult.errors.map((message) => `saved-folder: ${message}`));
        }
      } catch (error) {
        failures.push(`saved-folder: ${error.message}`);
      }

      const bundleResult = await tryAutoImportBundle();
      if (bundleResult.imported && bundleResult.imported.length > 0) {
        imported.push(...bundleResult.imported.map((schemaType) => `${schemaType} via ${bundleResult.endpoint}`));
      } else if (bundleResult.errors) {
        failures.push(`bundle: ${bundleResult.errors.join(' ; ')}`);
      }

      if (!imported.some((entry) => entry.startsWith('polygon'))) {
        try {
          const { endpoint, schema } = await fetchFirstAvailableSchema('polygon-export.json');
          importSchema(schema);
          imported.push(`polygon from ${endpoint}`);
        } catch (error) {
          failures.push(`polygon: ${error.message}`);
        }
      }

      if (!imported.some((entry) => entry.startsWith('triangulation'))) {
        try {
          const { endpoint, schema } = await fetchFirstAvailableSchema('triangulation-export.json');
          importSchema(schema);
          imported.push(`triangulation from ${endpoint}`);
        } catch (error) {
          failures.push(`triangulation: ${error.message}`);
        }
      }

      if (imported.length > 0) {
        setStatus(`Auto-imported ${imported.length} schema(s): ${imported.join(', ')}.`);
      } else {
        setStatus(`Auto-import failed. ${failures.join(' | ')}`, true);
      }

      if (failures.length > 0) {
        console.warn('Auto import failures:', failures);
      }
    }

    fileInputElt.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }

      try {
        importSchema(await file.text());
      } catch (error) {
        setStatus(`Import failed: ${error.message}`, true);
      }
    });

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const endpoint = endpointInputElt.value.trim();
      if (!endpoint) {
        setStatus('Please provide an endpoint URL.', true);
        return;
      }

      try {
        await fetchAndImportSchema(endpoint);
      } catch (error) {
        setStatus(`Fetch/import failed: ${error.message}`, true);
      }
    });


    connectDirBtnElt.addEventListener('click', async () => {
      if (!supportsDirectoryHandlePersistence()) {
        setStatus('This browser does not support folder permission APIs. Use file picker or localhost helper.', true);
        return;
      }

      try {
        const directoryHandle = await window.showDirectoryPicker({ mode: 'read' });
        const permission = await directoryHandle.requestPermission({ mode: 'read' });
        if (permission !== 'granted') {
          setStatus('Folder permission not granted. Auto-import from folder is disabled.', true);
          return;
        }

        await saveDirectoryHandle(directoryHandle);
        const result = await importFromDirectoryHandle(directoryHandle);
        if (result.imported.length > 0) {
          setStatus(`Connected folder and imported: ${result.imported.join(', ')}.`);
        } else {
          setStatus(`Folder connected, but no schemas imported: ${result.failures.join(' | ')}`, true);
        }
      } catch (error) {
        setStatus(`Failed to connect folder: ${error.message}`, true);
      }
    });

    function downloadJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('exportStateBtn').addEventListener('click', () => {
      if (!calculator) {
        setStatus('Desmos calculator is not initialized yet.', true);
        return;
      }
      const state = calculator.getState();
      downloadJson('desmos-state.json', state);
      setStatus('Exported full Desmos state.');
    });

    document.getElementById('exportPolysBtn').addEventListener('click', () => {
      if (!calculator) {
        setStatus('Desmos calculator is not initialized yet.', true);
        return;
      }
      const expressions = calculator.getExpressions();
      const polygons = expressions
        .filter((expr) => typeof expr.latex === 'string' && expr.latex.startsWith('polygon('))
        .map((expr) => ({ type: 'polygon-expression', id: expr.id, latex: expr.latex }));
      downloadJson('desmos-polygons.json', polygons);
      setStatus(`Exported ${polygons.length} polygon expression(s).`);
    });

    window.addEventListener('load', () => {
      if (typeof Desmos === 'undefined' || !Desmos.GraphingCalculator) {
        setStatus('Failed to load Desmos API. Check your network connection and reload.', true);
        return;
      }
      calculator = Desmos.GraphingCalculator(calculatorElt, { expressions: true });
      endpointInputElt.value = 'http://127.0.0.1:8765/polygon-export.json';
      setStatus('Ready. Importing available schema JSON files...');
      autoImportDefaultSchemas();
    });
  </script>
</body>
</html>
