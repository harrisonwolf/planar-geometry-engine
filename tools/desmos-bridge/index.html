<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desmos Bridge</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      .page {
        max-width: 1060px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
      }

      .subtitle {
        margin: 0 0 20px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button,
      input[type='url'] {
        font: inherit;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 6px 10px;
        background: #fff;
        cursor: pointer;
      }

      button:hover {
        background: #f3f4f6;
      }

      input[type='url'] {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 6px 8px;
      }

      #status {
        margin: 0 0 14px;
        font-size: 14px;
      }

      #status.error {
        color: #991b1b;
      }

      #status.ok {
        color: #065f46;
      }

      #calculator {
        height: min(72vh, 780px);
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #fff;
      }

      .hidden-input {
        display: none;
      }

      .provenance {
        position: fixed;
        right: 12px;
        bottom: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.9);
        color: #f9fafb;
        font-size: 12px;
        line-height: 1;
        max-width: calc(100vw - 24px);
      }

      .provenance span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .provenance button {
        border: 0;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 11px;
        cursor: pointer;
        background: #374151;
        color: #f9fafb;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Desmos Bridge</h1>
      <p class="subtitle">Import polygon/triangulation JSON and render in Desmos.</p>

      <div class="controls">
        <section class="card">
          <h2>Polygon</h2>
          <div class="row">
            <button type="button" id="polygon-file-btn">Import polygon file</button>
            <button type="button" id="polygon-default-btn">Load current polygon export</button>
          </div>
          <input class="hidden-input" type="file" id="polygon-file" accept="application/json,.json" />
        </section>

        <section class="card">
          <h2>Triangulation</h2>
          <div class="row">
            <button type="button" id="tri-file-btn">Import triangulation file</button>
            <button type="button" id="tri-default-btn">Load current triangulation export</button>
          </div>
          <input class="hidden-input" type="file" id="tri-file" accept="application/json,.json" />
        </section>

        <section class="card">
          <h2>Import from URL</h2>
          <div class="row" style="flex-direction: column; align-items: stretch">
            <input type="url" id="url-input" placeholder="http://localhost:8000/path/to/file.json" />
            <div class="row">
              <button type="button" id="url-polygon-btn">Load as polygon</button>
              <button type="button" id="url-tri-btn">Load as triangulation</button>
            </div>
          </div>
        </section>
      </div>

      <p id="status">Ready.</p>
      <div id="calculator"></div>
    </div>

    <div class="provenance" id="provenance" hidden>
      <span id="provenance-text"></span>
      <button id="copy-provenance" type="button">Copy provenance</button>
    </div>

    <script src="./build-info.js"></script>
    <script>
      (function () {
        const statusEl = document.getElementById('status');
        const calculatorHost = document.getElementById('calculator');
        let calculator = null;
        let hasDesmos = false;

        function getDesmosScriptCandidates() {
          const params = new URLSearchParams(window.location.search);
          const urlKey = (params.get('desmosApiKey') || '').trim();
          const storedKey = (window.localStorage && localStorage.getItem('desmosApiKey') || '').trim();
          const defaultKey = '8b15cf51fb804d80a5d3d2278786f64c';
          const apiKey = urlKey || storedKey || defaultKey;
          const versions = ['v1.11', 'v1.10'];
          return versions.map((version) => ({
            url: `https://www.desmos.com/api/${version}/calculator.js?apiKey=${encodeURIComponent(apiKey)}`,
            apiKey,
            version
          }));
        }

        function injectScript(src) {
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.onload = resolve;
            script.onerror = () => reject(new Error(`Failed to load ${src}`));
            document.head.appendChild(script);
          });
        }

        async function ensureDesmosLoaded() {
          if (typeof window.Desmos !== 'undefined' && typeof window.Desmos.GraphingCalculator === 'function') {
            return { ok: true, reason: 'already-loaded' };
          }

          const candidates = getDesmosScriptCandidates();
          for (const candidate of candidates) {
            try {
              await injectScript(candidate.url);
              if (typeof window.Desmos !== 'undefined' && typeof window.Desmos.GraphingCalculator === 'function') {
                return { ok: true, reason: `loaded-${candidate.version}` };
              }
            } catch (_err) {
              // Try next candidate.
            }
          }

          return {
            ok: false,
            reason: 'network-blocked-or-invalid-api-key',
            hint: 'Set a valid key via ?desmosApiKey=... or localStorage.desmosApiKey.'
          };
        }

        async function initializeCalculator() {
          const loadResult = await ensureDesmosLoaded();
          hasDesmos = loadResult.ok;

          if (!hasDesmos) {
            calculatorHost.innerHTML =
              '<div style="padding:12px;color:#7f1d1d">Desmos API failed to load. Check network access and API key. You can set ?desmosApiKey=... in the URL and reload.</div>';
            return;
          }

          calculator = window.Desmos.GraphingCalculator(calculatorHost, {
            expressionsCollapsed: false,
            settingsMenu: false
          });
        }

        function setStatus(message, kind) {
          statusEl.textContent = message;
          statusEl.className = kind || '';
        }

        function asPointPairs(points) {
          if (!Array.isArray(points)) return null;
          return points
            .filter((pt) => Array.isArray(pt) && pt.length >= 2)
            .map((pt) => [Number(pt[0]), Number(pt[1])])
            .filter((pt) => Number.isFinite(pt[0]) && Number.isFinite(pt[1]));
        }

        function polygonLatex(points) {
          const valid = asPointPairs(points);
          if (!valid || valid.length < 3) {
            throw new Error('Polygon must contain at least 3 valid [x,y] points.');
          }

          const withClose = valid.concat([valid[0]]);
          const pointList = withClose
            .map((pt) => `(${pt[0]},${pt[1]})`)
            .join(',');

          return `\\operatorname{polygon}\\left(${pointList}\\right)`;
        }

        function renderPolygon(points, idPrefix) {
          const latex = polygonLatex(points);

          if (!calculator) {
            return;
          }

          calculator.setExpression({
            id: `${idPrefix}_outline`,
            type: 'expression',
            latex
          });
        }

        function renderTriangulation(polygons, idPrefix) {
          if (!Array.isArray(polygons)) {
            throw new Error('Triangulation payload must contain a polygons array.');
          }

          const listItems = polygons.map((poly) => polygonLatex(poly.points));

          if (!calculator) {
            return;
          }

          calculator.setExpression({
            id: `${idPrefix}_list`,
            type: 'expression',
            latex: `[${listItems.join(',')}]`
          });
        }

        function clearScene() {
          if (!calculator) {
            return;
          }
          calculator.removeExpression({ id: 'polygon_outline' });
          calculator.removeExpression({ id: 'triangulation_list' });
        }

        function clearArtifact(type) {
          if (!calculator) {
            return;
          }
          if (type === 'polygon') {
            calculator.removeExpression({ id: 'polygon_outline' });
            return;
          }
          if (type === 'triangulation') {
            calculator.removeExpression({ id: 'triangulation_list' });
          }
        }

        const artifactHandlers = {
          polygon: {
            defaultPrefix: 'polygon',
            render(parsed) {
              renderPolygon(parsed && parsed.points, 'polygon');
            },
            successMessage(sourceLabel) {
              return hasDesmos
                ? `Loaded polygon from ${sourceLabel}.`
                : `Validated polygon from ${sourceLabel}, but rendering is unavailable (Desmos API not loaded).`;
            }
          },
          triangulation: {
            defaultPrefix: 'triangulation',
            render(parsed) {
              renderTriangulation(parsed && parsed.polygons, 'triangulation');
            },
            successMessage(sourceLabel) {
              return hasDesmos
                ? `Loaded triangulation from ${sourceLabel}.`
                : `Validated triangulation from ${sourceLabel}, but rendering is unavailable (Desmos API not loaded).`;
            }
          }
        };

        function resolveArtifactType(parsed, fallbackMode) {
          if (parsed && typeof parsed.type === 'string' && artifactHandlers[parsed.type]) {
            return parsed.type;
          }

          if (fallbackMode === 'tri') {
            return 'triangulation';
          }

          if (fallbackMode === 'polygon') {
            return 'polygon';
          }

          throw new Error('Unsupported artifact type.');
        }

        function parseAndRender(raw, fallbackMode, sourceLabel) {
          let parsed;
          try {
            parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
          } catch (_err) {
            throw new Error('Invalid JSON payload.');
          }

          const artifactType = resolveArtifactType(parsed, fallbackMode);
          const handler = artifactHandlers[artifactType];
          if (!handler) {
            throw new Error(`Unsupported artifact type: ${artifactType}`);
          }

          if (parsed && parsed.schemaVersion && parsed.schemaVersion !== 1) {
            throw new Error(`Unsupported schemaVersion: ${parsed.schemaVersion}`);
          }

          handler.render(parsed);
          setStatus(
            handler.successMessage(sourceLabel),
            hasDesmos ? 'ok' : 'error'
          );
        }

        async function loadTextFromFile(fileInput) {
          const file = fileInput.files && fileInput.files[0];
          if (!file) return null;
          return await file.text();
        }

        async function loadFromUrl(url) {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) {
            throw new Error(`Failed to fetch URL (${res.status}).`);
          }
          return await res.text();
        }

        async function loadCurrentSessionPayload() {
          const nonce = Date.now().toString();
          delete window.__GEOM_AUTOLOAD__;
          await injectScript(`./latest-session.js?nonce=${encodeURIComponent(nonce)}`);
          const payload = window.__GEOM_AUTOLOAD__;
          if (!payload || !Array.isArray(payload.artifacts)) {
            throw new Error('Missing bridge autoload payload.');
          }
          if (payload.schemaVersion && payload.schemaVersion !== 1) {
            throw new Error(`Unsupported schemaVersion: ${payload.schemaVersion}`);
          }
          return payload;
        }

        function getDefaultArtifactPath(type, artifactSet) {
          if (artifactSet === 'latest') {
            if (type === 'polygon') {
              return './latest-polygon-export.json';
            }
            if (type === 'triangulation') {
              return './latest-triangulation-export.json';
            }
          }

          if (type === 'polygon') {
            return './polygon-export.json';
          }
          return './triangulation-export.json';
        }

        async function autoLoadLatestExports() {
          const params = new URLSearchParams(window.location.search);
          const autoload = (params.get('autoload') || '').trim();
          const artifactSet = (params.get('artifactSet') || 'latest').trim();
          if (!autoload) {
            return;
          }

          if (autoload === 'session') {
            try {
              const payload = await loadCurrentSessionPayload();
              clearScene();
              for (const artifact of payload.artifacts) {
                parseAndRender(artifact, artifact.type === 'triangulation' ? 'tri' : artifact.type, 'latest-session.js');
              }
            } catch (err) {
              setStatus(err.message, 'error');
            }
            return;
          }

          const requestedTypes = autoload.split(',').map((item) => item.trim()).filter(Boolean);
          if (requestedTypes.length === 0) {
            return;
          }

          clearScene();
          for (const type of requestedTypes) {
            try {
              if (type === 'polygon') {
                const path = getDefaultArtifactPath('polygon', artifactSet);
                const text = await loadFromUrl(`${path}?nonce=${encodeURIComponent(params.get('nonce') || Date.now().toString())}`);
                parseAndRender(text, 'polygon', path.replace('./', ''));
              } else if (type === 'triangulation') {
                const path = getDefaultArtifactPath('triangulation', artifactSet);
                const text = await loadFromUrl(`${path}?nonce=${encodeURIComponent(params.get('nonce') || Date.now().toString())}`);
                parseAndRender(text, 'tri', path.replace('./', ''));
              }
            } catch (err) {
              setStatus(err.message, 'error');
              return;
            }
          }
        }

        function wireFileButton(buttonId, inputId, mode) {
          const button = document.getElementById(buttonId);
          const input = document.getElementById(inputId);
          button.addEventListener('click', () => input.click());
          input.addEventListener('change', async () => {
            try {
              const text = await loadTextFromFile(input);
              if (!text) return;
              clearArtifact(mode === 'tri' ? 'triangulation' : mode);
              parseAndRender(text, mode, input.files[0].name);
            } catch (err) {
              setStatus(err.message, 'error');
            } finally {
              input.value = '';
            }
          });
        }

        wireFileButton('polygon-file-btn', 'polygon-file', 'polygon');
        wireFileButton('tri-file-btn', 'tri-file', 'tri');

        document.getElementById('polygon-default-btn').addEventListener('click', async () => {
          try {
            clearArtifact('polygon');
            const payload = await loadCurrentSessionPayload();
            const polygonArtifact = payload.artifacts.find((artifact) => artifact.type === 'polygon');
            if (!polygonArtifact) {
              throw new Error('No polygon artifact is available in the current session.');
            }
            parseAndRender(polygonArtifact, 'polygon', 'latest-session.js');
          } catch (err) {
            setStatus(err.message, 'error');
          }
        });

        document.getElementById('tri-default-btn').addEventListener('click', async () => {
          try {
            clearArtifact('triangulation');
            const payload = await loadCurrentSessionPayload();
            const triangulationArtifact = payload.artifacts.find((artifact) => artifact.type === 'triangulation');
            if (!triangulationArtifact) {
              throw new Error('No triangulation artifact is available in the current session.');
            }
            parseAndRender(triangulationArtifact, 'tri', 'latest-session.js');
          } catch (err) {
            setStatus(err.message, 'error');
          }
        });

        async function loadFromUrlInput(mode) {
          const url = document.getElementById('url-input').value.trim();
          if (!url) {
            setStatus('Please enter a URL.', 'error');
            return;
          }
          try {
            const text = await loadFromUrl(url);
            parseAndRender(text, mode, url);
          } catch (err) {
            setStatus(err.message, 'error');
          }
        }

        document.getElementById('url-polygon-btn').addEventListener('click', () => loadFromUrlInput('polygon'));
        document.getElementById('url-tri-btn').addEventListener('click', () => loadFromUrlInput('tri'));


        initializeCalculator().then(autoLoadLatestExports);

        const info = window.__BUILD_INFO__;
        if (info) {
          const branch = info.branch || 'unknown';
          const shortSha = (info.commit && info.commit.short) || 'unknown';
          const dirtyLabel = info.dirty ? ' (dirty)' : '';
          const builtAt = info.buildTimeUtc || 'unknown';
          const text = `${branch} @ ${shortSha}${dirtyLabel} • built ${builtAt}`;

          const badge = document.getElementById('provenance');
          const textNode = document.getElementById('provenance-text');
          const copyButton = document.getElementById('copy-provenance');

          textNode.textContent = `Generated from ${text}`;
          badge.hidden = false;

          copyButton.addEventListener('click', async function () {
            try {
              await navigator.clipboard.writeText(text);
              copyButton.textContent = 'Copied';
              setTimeout(function () {
                copyButton.textContent = 'Copy provenance';
              }, 1200);
            } catch (_err) {
              copyButton.textContent = 'Copy failed';
            }
          });
        }
      })();
    </script>
  </body>
</html>
